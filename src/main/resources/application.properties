# Application Configuration
spring.application.name=soaventas
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://ep-shy-firefly-am4dy1aa-pooler.c-5.us-east-1.aws.neon.tech/ventas_db?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_IRns5uLEkmJ6
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.com.donbelisario.ventas=DEBUG
logging.level.org.springframework.web=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.info.env.enabled=true

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true